name: Reusable CI/CD Pipeline

on:
  workflow_call:
    inputs:
      branch:
        description: "Branch name to use in builds"
        required: true
        type: string
    secrets:
      DOCKERHUB_TOKEN:
        required: true

env:
  REGISTRY: docker.io

jobs:
  lint-and-test:
    environment: local
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 black pytest

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Django tests
        continue-on-error: true
        run: python manage.py test

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Node dependencies
        working-directory: ./mynotes
        run: npm ci

      - name: Lint React
        continue-on-error: true
        working-directory: ./mynotes
        run: npm run lint

      - name: Run React tests
        continue-on-error: true
        working-directory: ./mynotes
        run: npm test

  build:
    needs: lint-and-test
    environment: local
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app:${{ inputs.branch }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./mynotes
          file: ./mynotes/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-frontend:${{ inputs.branch }}

      - name: Build and push nginx
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-nginx:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/notes-app-nginx:${{ inputs.branch }}