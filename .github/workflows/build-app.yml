build:
  needs: lint-and-test
  runs-on: ubuntu-latest
  environment: local       # <-- picks up environment-level vars/secrets
  permissions:
    contents: read
    packages: write

  env:
    REGISTRY: docker.io   # define registry as env variable

  steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}   # environment variable
        password: ${{ secrets.DOCKERHUB_TOKEN }}   # secret

    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app:latest
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app:${{ github.sha }}

    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./mynotes
        file: ./mynotes/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app-frontend:latest
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app-frontend:${{ github.sha }}

    - name: Build and push nginx
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        file: ./nginx/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app-nginx:latest
          ${{ env.REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/notes-app-nginx:${{ github.sha }}